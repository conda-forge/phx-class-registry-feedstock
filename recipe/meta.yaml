{% set python_min = "3.12.0" %}
{% set name = "phx-class-registry" %}
{% set version = "5.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c8f792b8856a6c0af990f648be108de10ed0560771555d81a0452c4627f8f489

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<4.0.0

test:
  imports:
    - class_registry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/todofixthis/class-registry
  summary: Factory+Registry pattern for Python classes
  license: MIT
  license_file: LICENCE.txt

extra:
  recipe-maintainers:
    - freundTech
