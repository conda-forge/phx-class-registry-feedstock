{% set python_min = '3.9.0' %}
{% set name = "phx-class-registry" %}
{% set version = "4.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/phx-class-registry-{{ version }}.tar.gz
  sha256: 66e9818de0a9d62e8cfe311587fcd3853ba941b71c11a7a73e5808d6550db125

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }},<4.0.0

test:
  imports:
    - class_registry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/todofixthis/class-registry
  summary: Factory+Registry pattern for Python classes
  license: MIT
  license_file: LICENCE.txt

extra:
  recipe-maintainers:
    - freundTech
